<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <?!= include('Stylesheet') ?>
  </head>
  <body>
    <div id="root"><div class="loading">Loading…</div></div>

    <script>
      const root = document.getElementById('root');

      load();

      function load() {
        root.innerHTML = '<div class="loading">Loading…</div>';
        google.script.run
          .withSuccessHandler(render)
          .withFailureHandler(err => {
            root.innerHTML = '<div class="error">Could not read form: '
              + escapeHtml(err.message || err) + '</div>';
          })
          .getEmbedData();
      }

      function render(d) {
        root.innerHTML = d.connected ? renderConnected(d) : renderDisconnected(d);
        wireUp();
        resizeModal();
      }

      // Apps Script modals can't size themselves to content automatically.
      // We measure body height and ask the host to match — eliminates the
      // dead space below short states (e.g. connected) and avoids the
      // chrome cropping content on long states (e.g. welcome).
      function resizeModal() {
        try {
          const h = document.body.scrollHeight;
          google.script.host.setHeight(h);
        } catch (_) { /* not available outside Apps Script */ }
      }

      // Welcome / disconnected state. First thing every new user sees —
      // it's the entire pitch in one screen. Lead with the value prop,
      // not the form's title or a "not connected" label. Keep the
      // checklist short; long lists get skimmed past.
      //
      // The auto-publish checkbox swaps the Connect button's href
      // between /app?form=...&publish=1 and the bare variant — the web
      // app reads the flag during import and calls Forms setPublishSettings.
      // Defaults checked because the renderer refuses unpublished forms;
      // leaving it unchecked means the user has to hit Publish on Google
      // separately before the embed will render.
      function renderDisconnected(d) {
        return `
          <p class="welcome-title">Embed this form on your site</p>
          <p class="lead">
            Connect once. Paste a snippet. Done.
          </p>

          <ul class="checklist">
            <li>Works on Webflow, WordPress, plain HTML</li>
            <li>Match your site's colors, fonts, logo</li>
            <li>Drop the Google watermark</li>
            <li>Auto-syncs when you edit the form</li>
          </ul>

          <label class="checkbox">
            <input type="checkbox" id="auto-publish" checked />
            <span>Also publish my form on Google so anyone with the link can respond.</span>
          </label>

          <a class="btn primary" id="connect-btn"
            href="${escapeHtml(d.connectUrl)}"
            target="_blank">
            Connect to TakumiForm
          </a>
          <p class="footnote">
            Free for 100 responses/mo. No card.
          </p>

          <div class="refresh">
            <button class="link" id="refresh">I've connected — refresh</button>
          </div>
        `;
      }

      // Connected state. Modal title bar already says "TakumiForm —
      // Embed" so we don't repeat the form name; lead with status, then
      // the snippet (the thing the user came for), then secondary actions.
      function renderConnected(d) {
        const synced = d.updatedAt ? syncedAgo(d.updatedAt) : null;
        return `
          <div class="status-row">
            <span class="badge ok">Connected</span>
            ${synced ? `
              <span class="status-meta">
                Synced ${escapeHtml(synced)}
                <span class="dot">·</span>
                <a href="${escapeHtml(d.syncUrl)}" target="_blank">Sync now</a>
                <span class="dot">·</span>
                <button class="link" id="refresh">Refresh</button>
              </span>
            ` : ''}
          </div>

          <p class="label">Embed snippet</p>
          ${snippetBox('s1', d.script)}
          <p class="hint">
            Paste this anywhere on your site. Works in WordPress, Webflow, Squarespace, Framer, plain HTML.
          </p>

          <div class="row">
            <a class="btn" href="${escapeHtml(d.previewUrl)}" target="_blank">Preview</a>
            <a class="btn" href="${escapeHtml(d.connectUrl)}" target="_blank">Customize</a>
          </div>

          <details>
            <summary>Iframe option (no JavaScript)</summary>
            ${snippetBox('s2', d.iframe)}
            <p class="hint">
              Use this only if the host page can't run JavaScript.
            </p>
          </details>
        `;
      }

      // Apps Script gives us a millisecond epoch — format it client-side
      // so the modal matches the dashboard's "Synced X ago" phrasing.
      function syncedAgo(ms) {
        const diff = Date.now() - ms;
        const sec = Math.floor(diff / 1000);
        if (sec < 30) return 'just now';
        if (sec < 60) return sec + 's ago';
        const min = Math.floor(sec / 60);
        if (min < 60) return min + ' min ago';
        const hr = Math.floor(min / 60);
        if (hr < 24) return hr + 'h ago';
        const day = Math.floor(hr / 24);
        return day + 'd ago';
      }

      function snippetBox(id, value) {
        const rows = Math.min(6, Math.max(2, value.split('\n').length));
        return `
          <div class="snippet">
            <textarea id="${id}" rows="${rows}" readonly>${escapeHtml(value)}</textarea>
            <button class="copy" data-target="${id}">Copy</button>
          </div>
        `;
      }

      function wireUp() {
        document.querySelectorAll('.copy').forEach(btn => {
          btn.addEventListener('click', () => {
            const ta = document.getElementById(btn.dataset.target);
            ta.select();
            try { navigator.clipboard.writeText(ta.value); }
            catch (_) { document.execCommand('copy'); }
            btn.textContent = 'Copied';
            btn.classList.add('copied');
            setTimeout(() => {
              btn.textContent = 'Copy';
              btn.classList.remove('copied');
            }, 1500);
          });
        });

        const refresh = document.getElementById('refresh');
        if (refresh) refresh.addEventListener('click', load);

        document.querySelectorAll('details').forEach(d => {
          d.addEventListener('toggle', resizeModal);
        });

        // Auto-publish — fires in parallel with the Connect anchor's
        // native new-tab navigation. We deliberately DON'T preventDefault
        // because google.script.run is async and any deferred window.open
        // would be blocked by popup heuristics.
        //
        // The publish call uses the add-on's forms.body scope and the
        // script's own OAuth token (see publishActiveForm in Code.js).
        // No backend round-trip needed — the user's add-on session
        // already has the permission. By the time they sign in to the
        // web app and land on /app, their form is already published.
        const autoPublish = document.getElementById('auto-publish');
        const connectBtn = document.getElementById('connect-btn');
        if (autoPublish && connectBtn) {
          connectBtn.addEventListener('click', () => {
            if (!autoPublish.checked) return;
            google.script.run
              .withFailureHandler(err => console.warn('Auto-publish failed:', err && err.message))
              .publishActiveForm();
          });
        }
      }

      function escapeHtml(s) {
        return String(s).replace(/[&<>"']/g, c => ({
          '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
        })[c]);
      }
    </script>
  </body>
</html>
