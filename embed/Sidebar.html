<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <style>
      body { font-family: 'Google Sans', Roboto, Arial, sans-serif; margin: 0; padding: 16px; color: #202124; }
      .title { font-size: 16px; font-weight: 500; margin: 0 0 6px; line-height: 1.3; }
      .badge { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; font-weight: 500; padding: 3px 9px; border-radius: 999px; margin-bottom: 18px; }
      .badge.ok { background: #e6f4ea; color: #137333; }
      .badge.no { background: #fef7e0; color: #b06000; }
      .badge::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
      .lead { font-size: 13px; line-height: 1.5; color: #3c4043; margin: 0 0 14px; }
      .label { font-size: 11px; font-weight: 500; color: #5f6368; text-transform: uppercase; letter-spacing: 0.5px; margin: 0 0 6px; }
      .btn { display: block; width: 100%; box-sizing: border-box; padding: 10px 14px; font-size: 14px; font-weight: 500; border-radius: 6px; text-decoration: none; cursor: pointer; text-align: center; border: 1px solid #dadce0; background: #fff; color: #1a73e8; }
      .btn.primary { background: #1a73e8; color: #fff; border-color: #1a73e8; }
      .btn.primary:hover { background: #1765cc; }
      .btn + .btn { margin-top: 8px; }
      .snippet { position: relative; margin-bottom: 12px; }
      textarea { width: 100%; box-sizing: border-box; font-family: 'Roboto Mono', Menlo, monospace; font-size: 12px; padding: 10px 10px 34px; border: 1px solid #dadce0; border-radius: 6px; background: #f8f9fa; resize: none; color: #202124; line-height: 1.4; }
      .copy { position: absolute; right: 8px; bottom: 8px; font-size: 11px; font-weight: 500; padding: 4px 10px; border: 1px solid #dadce0; border-radius: 4px; background: #fff; color: #1a73e8; cursor: pointer; }
      .copy:hover { background: #f1f3f4; }
      .copy.copied { color: #137333; border-color: #137333; }
      .hint { font-size: 12px; line-height: 1.45; color: #5f6368; margin: 0 0 18px; }
      .freshness { font-size: 12px; line-height: 1.4; color: #5f6368; margin: 0 0 18px; }
      .freshness a, .freshness .link { color: #1a73e8; text-decoration: none; }
      .freshness a:hover, .freshness .link:hover { text-decoration: underline; }
      .freshness .dot { margin: 0 6px; color: #bdc1c6; }
      .row { display: flex; gap: 8px; margin-bottom: 4px; }
      .row .btn { flex: 1; padding: 8px 10px; font-size: 13px; }
      details { margin-top: 18px; border-top: 1px solid #e8eaed; padding-top: 14px; }
      summary { font-size: 12px; color: #5f6368; cursor: pointer; outline: none; user-select: none; }
      summary:hover { color: #202124; }
      details[open] summary { margin-bottom: 10px; }
      .link { font-size: 12px; color: #1a73e8; cursor: pointer; text-decoration: underline; background: none; border: none; padding: 0; }
      .loading, .error { font-size: 13px; color: #5f6368; padding: 32px 8px; text-align: center; }
      .error { color: #c5221f; }
      .refresh { margin-top: 14px; text-align: center; }
    </style>
  </head>
  <body>
    <div id="root"><div class="loading">Loading…</div></div>

    <script>
      const root = document.getElementById('root');

      load();

      function load() {
        root.innerHTML = '<div class="loading">Loading…</div>';
        google.script.run
          .withSuccessHandler(render)
          .withFailureHandler(err => {
            root.innerHTML = '<div class="error">Could not read form: '
              + escapeHtml(err.message || err) + '</div>';
          })
          .getEmbedData();
      }

      function render(d) {
        root.innerHTML = d.connected ? renderConnected(d) : renderDisconnected(d);
        wireUp();
      }

      function renderDisconnected(d) {
        return `
          <p class="title">${escapeHtml(d.title)}</p>
          <span class="badge no">Not connected</span>
          <p class="lead">
            Connect this form to TakumiForm to get a copy-paste embed snippet
            that works on any website.
          </p>
          <a class="btn primary" href="${escapeHtml(d.connectUrl)}" target="_blank">
            Connect to TakumiForm
          </a>
          <div class="refresh">
            <button class="link" id="refresh">I've connected — refresh</button>
          </div>
        `;
      }

      function renderConnected(d) {
        const synced = d.updatedAt ? syncedAgo(d.updatedAt) : null;
        return `
          <p class="title">${escapeHtml(d.title)}</p>
          <span class="badge ok">Connected</span>

          ${synced ? `
            <p class="freshness">
              Synced ${escapeHtml(synced)}.
              <a href="${escapeHtml(d.syncUrl)}" target="_blank">Sync now</a>
              <span class="dot">·</span>
              <button class="link" id="refresh">Refresh status</button>
            </p>
          ` : ''}

          <p class="label">Embed snippet</p>
          ${snippetBox('s1', d.script)}
          <p class="hint">
            Paste this anywhere on your site. Works in WordPress, Webflow,
            Squarespace, Framer, plain HTML.
          </p>

          <div class="row">
            <a class="btn" href="${escapeHtml(d.previewUrl)}" target="_blank">Preview</a>
            <a class="btn" href="${escapeHtml(d.connectUrl)}" target="_blank">Open dashboard</a>
          </div>

          <details>
            <summary>Iframe option (no JavaScript)</summary>
            ${snippetBox('s2', d.iframe)}
            <p class="hint">
              Use this only if the host page can't run JavaScript.
            </p>
          </details>
        `;
      }

      // Apps Script gives us a millisecond epoch — format it client-side
      // so the sidebar matches the dashboard's "Synced X ago" phrasing.
      function syncedAgo(ms) {
        const diff = Date.now() - ms;
        const sec = Math.floor(diff / 1000);
        if (sec < 30) return 'just now';
        if (sec < 60) return sec + 's ago';
        const min = Math.floor(sec / 60);
        if (min < 60) return min + ' min ago';
        const hr = Math.floor(min / 60);
        if (hr < 24) return hr + 'h ago';
        const day = Math.floor(hr / 24);
        return day + 'd ago';
      }

      function snippetBox(id, value) {
        const rows = Math.min(6, Math.max(2, value.split('\n').length));
        return `
          <div class="snippet">
            <textarea id="${id}" rows="${rows}" readonly>${escapeHtml(value)}</textarea>
            <button class="copy" data-target="${id}">Copy</button>
          </div>
        `;
      }

      function wireUp() {
        document.querySelectorAll('.copy').forEach(btn => {
          btn.addEventListener('click', () => {
            const ta = document.getElementById(btn.dataset.target);
            ta.select();
            try { navigator.clipboard.writeText(ta.value); }
            catch (_) { document.execCommand('copy'); }
            btn.textContent = 'Copied';
            btn.classList.add('copied');
            setTimeout(() => {
              btn.textContent = 'Copy';
              btn.classList.remove('copied');
            }, 1500);
          });
        });

        const refresh = document.getElementById('refresh');
        if (refresh) refresh.addEventListener('click', load);
      }

      function escapeHtml(s) {
        return String(s).replace(/[&<>"']/g, c => ({
          '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
        })[c]);
      }
    </script>
  </body>
</html>
