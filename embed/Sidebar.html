<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <style>
      body { font-family: 'Google Sans', Roboto, Arial, sans-serif; margin: 0; padding: 12px; color: #202124; }
      h2 { font-size: 14px; font-weight: 500; margin: 16px 0 6px; color: #5f6368; text-transform: uppercase; letter-spacing: 0.5px; }
      h2:first-child { margin-top: 4px; }
      p { font-size: 13px; line-height: 1.45; margin: 0 0 8px; color: #3c4043; }
      .title { font-size: 16px; font-weight: 500; margin: 0 0 2px; }
      .subtitle { font-size: 12px; color: #5f6368; margin: 0 0 12px; word-break: break-all; }
      .snippet { position: relative; }
      textarea { width: 100%; box-sizing: border-box; font-family: 'Roboto Mono', Menlo, monospace; font-size: 12px; padding: 8px 8px 28px; border: 1px solid #dadce0; border-radius: 4px; background: #f8f9fa; resize: vertical; min-height: 64px; color: #202124; }
      .copy { position: absolute; right: 6px; bottom: 6px; font-size: 11px; padding: 2px 8px; border: 1px solid #dadce0; border-radius: 3px; background: #fff; color: #1a73e8; cursor: pointer; }
      .copy:hover { background: #f1f3f4; }
      .copy.copied { color: #137333; border-color: #137333; }
      .btn-row { display: flex; gap: 8px; margin-top: 8px; }
      .btn { flex: 1; text-align: center; padding: 8px 12px; font-size: 13px; border-radius: 4px; text-decoration: none; cursor: pointer; border: 1px solid #dadce0; background: #fff; color: #1a73e8; }
      .btn.primary { background: #1a73e8; color: #fff; border-color: #1a73e8; }
      .loading, .error { font-size: 13px; color: #5f6368; padding: 24px 8px; text-align: center; }
      .error { color: #c5221f; }
      hr { border: 0; border-top: 1px solid #e8eaed; margin: 16px 0 0; }
    </style>
  </head>
  <body>
    <div id="root"><div class="loading">Loading form…</div></div>

    <script>
      const root = document.getElementById('root');

      google.script.run
        .withSuccessHandler(render)
        .withFailureHandler(err => {
          root.innerHTML = '<div class="error">Could not read form: ' + escapeHtml(err.message || err) + '</div>';
        })
        .getEmbedData();

      function render(data) {
        root.innerHTML = `
          <p class="title">Embed: ${escapeHtml(data.title)}</p>
          <p class="subtitle">Form ID: ${escapeHtml(data.formId)}</p>

          <h2>Script tag — any site</h2>
          <p>Paste anywhere in your page. Works in WordPress, Webflow, Squarespace, Framer, plain HTML.</p>
          ${snippetBox('s1', data.script)}

          <h2>React component</h2>
          ${snippetBox('s2', data.reactInstall)}
          ${snippetBox('s3', data.react)}

          <h2>Iframe fallback</h2>
          <p>Only use this if you can't run JavaScript on the host page.</p>
          ${snippetBox('s4', data.iframe)}

          <hr>
          <h2>Theme &amp; branding</h2>
          <p>Colors, fonts, logo, custom thank-you screen, strip Google chrome — all in the web editor.</p>
          <div class="btn-row">
            <a class="btn primary" href="${escapeHtml(data.editorUrl)}" target="_blank">Open editor</a>
            <a class="btn" href="${escapeHtml(data.previewUrl)}" target="_blank">Preview</a>
          </div>
        `;

        document.querySelectorAll('.copy').forEach(btn => {
          btn.addEventListener('click', () => {
            const ta = document.getElementById(btn.dataset.target);
            ta.select();
            try {
              navigator.clipboard.writeText(ta.value);
            } catch (_) {
              document.execCommand('copy');
            }
            btn.textContent = 'Copied';
            btn.classList.add('copied');
            setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 1500);
          });
        });
      }

      function snippetBox(id, value) {
        const rows = Math.min(8, Math.max(2, value.split('\n').length));
        return `
          <div class="snippet">
            <textarea id="${id}" rows="${rows}" readonly>${escapeHtml(value)}</textarea>
            <button class="copy" data-target="${id}">Copy</button>
          </div>
        `;
      }

      function escapeHtml(s) {
        return String(s).replace(/[&<>"']/g, c => ({
          '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
        })[c]);
      }
    </script>
  </body>
</html>
